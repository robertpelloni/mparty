name: mock_mario_party
# sha1: "" # Add your target SHA1 here (disabled for dummy test)
options:
  basename: mock_mario_party
  target_path: tests/roms/mock_mario_party.z64
  base_path: .
  compiler: GCC
  platform: n64
  find_file_boundaries: True
  header_encoding: ASCII
segments:
  - name: header
    type: header
    start: 0x0

  - name: boot
    type: bin
    start: 0x40

  - name: main
    type: code
    start: 0x1000
    vram: 0x80000400
    subsegments:
      - [0x1000, c]
      - [0x100000, data]

  - name: overlays
    type: code
    start: 0x100000 # Placeholder start for overlays
    vram: 0x80100000
    subsegments:
      - [0x100000, c]

  - [0x200000] # End of ROM marker placeholder
